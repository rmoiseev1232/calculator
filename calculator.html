<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ЕСТЕСТВО | Калькулятор заявок</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f2eb;font-family:Arial,sans-serif}
.hdr{background:linear-gradient(135deg,#1a1a1a,#2c2c2c);padding:18px 16px;color:#fff}
.hdr h1{font-size:20px;font-weight:700}
.hdr p{font-size:12px;opacity:.7;margin-top:3px}
.main{max-width:680px;margin:0 auto;padding:14px 12px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(27,67,50,.08);overflow:hidden;margin-bottom:14px}
.card-hdr{background:#1a1a1a;padding:10px 14px;font-size:11px;font-weight:700;color:#c9b47a;text-transform:uppercase;letter-spacing:.5px}
.row{padding:12px 14px;border-bottom:1px solid #e8e0d0}
.row:nth-child(odd){background:#fff}
.row:nth-child(even){background:#f7f4ef}
.row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.row-num{font-size:11px;color:#8b6914;font-weight:700}
.del-btn{background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:4px 8px;line-height:1;-webkit-appearance:none}
.name-lbl{display:none;font-size:13px;font-weight:600;color:#1a1a1a;background:#f0ead8;border-radius:6px;padding:7px 10px;margin-bottom:7px;line-height:1.4;word-break:break-word}
.prod-sel{width:100%;border:1.5px solid #ddd5c0;border-radius:6px;padding:9px 10px;font-size:14px;color:#aaa;background:#fff;-webkit-appearance:auto;appearance:auto}
.prod-sel.chosen{color:#555}
.row-bot{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.price-info{font-size:12px;color:#8b6914;font-weight:600}
.qty-wrap{display:flex;align-items:center;gap:8px}
.qty-wrap label{font-size:12px;color:#888}
.qty-sel{width:64px;border:1.5px solid #c9a84c;border-radius:6px;padding:7px 4px;font-size:15px;font-weight:700;color:#1a1a1a;background:#fdf8ec;text-align:center;-webkit-appearance:auto;appearance:auto}
.add-row{padding:10px 14px}
.add-row button{background:none;border:1.5px dashed #c9b47a;border-radius:6px;color:#8b6914;padding:10px;font-size:14px;cursor:pointer;font-weight:500;width:100%;-webkit-appearance:none}
.summary{background:#1a1a1a;border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.sum-info{color:#c9b47a;font-size:14px}
.sum-total{color:#c9a84c;font-weight:800;font-size:22px}
.sum-btns{display:flex;gap:10px}
.btn-clear{flex:1;background:transparent;border:1.5px solid #8b6914;color:#c9b47a;border-radius:8px;padding:12px 0;font-size:14px;cursor:pointer;-webkit-appearance:none}
.btn-order{flex:2;background:linear-gradient(135deg,#c9a84c,#8b6914);border:none;color:#fff;border-radius:8px;padding:12px 0;font-size:15px;cursor:pointer;font-weight:700;-webkit-appearance:none}
.btn-order:disabled{background:#333333;color:#555;cursor:not-allowed}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;padding:16px;overflow-y:auto}
.overlay.show{display:flex;align-items:flex-start;justify-content:center;padding-top:40px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:500px;overflow:hidden}
.modal-hdr{background:linear-gradient(135deg,#1a1a1a,#2c2c2c);padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.modal-hdr span{color:#fff;font-weight:700;font-size:15px}
.modal-hdr button{background:none;border:none;color:#c9b47a;font-size:26px;cursor:pointer;line-height:1;-webkit-appearance:none}
.modal-body{padding:16px 20px}
#orderText{width:100%;height:260px;border:1.5px solid #ddd5c0;border-radius:8px;padding:12px;font-size:13px;line-height:1.7;font-family:monospace;color:#1a1a1a;background:#f8fffe;resize:none;outline:none}
.modal-hint{margin-top:6px;font-size:12px;color:#888}
.modal-foot{padding:0 20px 16px;display:flex;gap:10px}
.btn-copy{flex:1;padding:12px 0;background:linear-gradient(135deg,#2c2c2c,#444444);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.btn-copy.done{background:#8b6914}
.btn-close-modal{padding:12px 16px;background:#f7f4ef;border:1.5px solid #ddd5c0;color:#2c2c2c;border-radius:8px;font-size:14px;cursor:pointer;-webkit-appearance:none}
</style>
</head>

      <button class="btn-close-modal" id="btnCloseModal2">Закрыть</button>
    </div>
  </div>
</div>

<script>
var CORDIALS=[["Абрикос",590],["Грейпфрут",590],["Клубника",590],["Лайм",490],["Личи",690],["Малина",590],["Манго",590],["Облепиха",590],["Фиалка",590],["Черешня",590],["Черная смородина",590],["Абрикос / Айва",690],["Арбуз / Мелисса / Биттер NEW",690],["Гуава / Земляника",690],["Гуава / Жасмин",690],["Гранат / Черемуха",690],["Дуб / Инжир / Брусника",690],["Ежевика / Грейпфрут / Ревень NEW",690],["Желтая слива / Алыча",690],["Малина / Фиалка",690],["Слива / Сакура",690],["Черника / Манго",690],["Юдзу / Ромашка",990],["Ягоды черной бузины",690],["Яблоко / Табак",690],["Зелёный виноград / Яблоко NEW",690]];
var PUREES=[["Абрикос",603],["Ананас",765],["Арбуз",423],["Арония NEW",576],["Банан",432],["Брусника NEW",855],["Вишня",594],["Вишня кислая",855],["Груша вильямс",468],["Гуава розовая NEW",657],["Дыня",468],["Ежевика",765],["Жимолость",1300],["Имбирь",945],["Каламанси",945],["Кизил NEW",576],["Клюква",765],["Клюква дикая NEW",792],["Клубника",522],["Кокос",810],["Красная смородина",621],["Крыжовник NEW",810],["Лайм",720],["Лимон",720],["Личи",810],["Малина",747],["Манго",585],["Маракуйя с кост.",945],["Маракуйя с кост. без/с",945],["Маракуйя б/к",990],["Маракуйя б/к без/с",990],["Нектарин",630],["Облепиха",522],["Персик",540],["Питахайя белая NEW",729],["Питахайя красная NEW",729],["Белый персик",558],["Слива",432],["Фейхоа NEW",495],["Черная смородина",855],["Черника",720],["Черешня NEW",891],["Шелковица NEW",720],["Юдзу",5850],["Яблоко",450]];
var BASES=[["Супер джус Лимон NEW",250],["Супер джус Лайм NEW",250],["Сауэр Микс Оригинал",305],["Сауэр Микс Лайм",315],["Абрикос",350],["Грейпфрут",350],["Ежевика",350],["Клубника",350],["Малина",425],["Персик",425],["Абрикос / Красная смородина / Курага NEW",475],["Ананас / Юдзу",550],["Арбуз / Яблоко",475],["Вишня / Черешня",475],["Груша / Фейхоа NEW",475],["Дыня / Голубика",475],["Имбирь / Лимон",475],["Каламанси / Лимон NEW",475],["Клюква / Брусника / Айва",475],["Клубника / Каламанси",475],["Личи / Питахайя",475],["Малина / Имбирь",475],["Манго / Маракуйя",475],["Облепиха / Лимон",475]];

var PRICE_MAP={};
CORDIALS.forEach(function(x){PRICE_MAP["Кордиал 700мл — "+x[0]]={price:x[1],cat:"Кордиал"};});
PUREES.forEach(function(x){PRICE_MAP["Пюре 900гр — "+x[0]]={price:x[1],cat:"Пюре"};});
BASES.forEach(function(x){PRICE_MAP["Основа 500мл — "+x[0]]={price:x[1],cat:"Основа"};});

var rows=[];
var uid=0;

function fmt(n){return n.toLocaleString("ru-RU")+" ₽";}

function makeSelect(rowObj){
  var sel=document.createElement("select");
  sel.className="prod-sel"+(rowObj.product?" chosen":"");
  var opt0=document.createElement("option");
  opt0.value=""; opt0.textContent="— выберите товар —";
  sel.appendChild(opt0);
  var groups=[
    ["КОРДИАЛЫ 700 МЛ", CORDIALS, "Кордиал 700мл — "],
    ["ПЮРЕ 900 ГР",      PUREES,   "Пюре 900гр — "],
    ["ОСНОВЫ 500 МЛ",    BASES,    "Основа 500мл — "]
  ];
  groups.forEach(function(g){
    var og=document.createElement("optgroup");
    og.label="── "+g[0]+" ──";
    g[1].forEach(function(x){
      var lbl=g[2]+x[0];
      var o=document.createElement("option");
      o.value=lbl; o.textContent=lbl;
      if(rowObj.product===lbl) o.selected=true;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });
  sel.addEventListener("change",function(){
    rowObj.product=sel.value;
    sel.className="prod-sel"+(sel.value?" chosen":"");
    updateRowUI(rowObj);
    updateSummary();
  });
  return sel;
}

function makeQtySelect(rowObj){
  var sel=document.createElement("select");
  sel.className="qty-sel";
  for(var i=1;i<=100;i++){
    var o=document.createElement("option");
    o.value=i; o.textContent=i;
    if(rowObj.qty===i) o.selected=true;
    sel.appendChild(o);
  }
  sel.addEventListener("change",function(){
    rowObj.qty=parseInt(sel.value);
    updateRowUI(rowObj);
    updateSummary();
  });
  return sel;
}

function getDiscount(){return Math.min(100,Math.max(0,parseInt(document.getElementById("discount").value)||0));}
function getMarkup(){return Math.max(0,parseInt(document.getElementById("markup").value)||0);}
function discounted(price){var d=getDiscount();var m=getMarkup();return Math.round(price*(1+m/100)*(1-d/100));}

function updateRowUI(rowObj){
  var lbl=document.getElementById("lbl_"+rowObj.id);
  var pi=document.getElementById("pi_"+rowObj.id);
  var prod=PRICE_MAP[rowObj.product];
  if(lbl){
    lbl.textContent=rowObj.product||"";
    lbl.style.display=rowObj.product?"block":"none";
  }
  if(pi){
    if(prod){
      var dp=discounted(prod.price);
      var d=getDiscount();
      var priceStr=d?("<s style=\"color:#aaa;font-size:11px\">"+fmt(prod.price)+"</s> "+fmt(dp)):fmt(dp);
      pi.innerHTML=priceStr+" × "+rowObj.qty+" = "+fmt(dp*rowObj.qty);
    } else { pi.innerHTML=""; }
  }
}

function createRowEl(rowObj,idx){
  var div=document.createElement("div");
  div.className="row";
  div.id="row_"+rowObj.id;

  // top
  var top=document.createElement("div");
  top.className="row-top";
  var num=document.createElement("span");
  num.className="row-num";
  num.textContent="ПОЗИЦИЯ "+(idx+1);
  var del=document.createElement("button");
  del.className="del-btn";
  del.textContent="✕";
  del.addEventListener("click",function(){removeRow(rowObj.id);});
  top.appendChild(num);
  top.appendChild(del);
  div.appendChild(top);

  // label
  var lbl=document.createElement("div");
  lbl.className="name-lbl";
  lbl.id="lbl_"+rowObj.id;
  lbl.style.display=rowObj.product?"block":"none";
  lbl.textContent=rowObj.product||"";
  div.appendChild(lbl);

  // product select
  div.appendChild(makeSelect(rowObj));

  // bottom
  var bot=document.createElement("div");
  bot.className="row-bot";
  var pi=document.createElement("div");
  pi.className="price-info";
  pi.id="pi_"+rowObj.id;
  var prod=PRICE_MAP[rowObj.product];
  pi.textContent=prod?fmt(prod.price)+" × "+rowObj.qty+" = "+fmt(prod.price*rowObj.qty):"";
  var qw=document.createElement("div");
  qw.className="qty-wrap";
  var qlbl=document.createElement("label");
  qlbl.textContent="Кол-во:";
  qw.appendChild(qlbl);
  qw.appendChild(makeQtySelect(rowObj));
  bot.appendChild(pi);
  bot.appendChild(qw);
  div.appendChild(bot);

  return div;
}

function renderAll(){
  var c=document.getElementById("rowsContainer");
  c.innerHTML="";
  rows.forEach(function(r,i){c.appendChild(createRowEl(r,i));});
  updateSummary();
}

function addRow(){
  rows.push({id:"r"+(++uid),product:"",qty:1});
  var c=document.getElementById("rowsContainer");
  c.appendChild(createRowEl(rows[rows.length-1],rows.length-1));
  updateSummary();
}

function removeRow(id){
  var i=rows.findIndex(function(r){return r.id===id;});
  if(i!==-1){rows.splice(i,1);}
  renderAll();
}

function updateSummary(){
  var filled=rows.filter(function(r){return r.product&&PRICE_MAP[r.product];});
  var total=filled.reduce(function(s,r){return s+discounted(PRICE_MAP[r.product].price)*r.qty;},0);
  document.getElementById("cntEl").textContent=filled.length;
  var totalEl=document.getElementById("totalEl");
  totalEl.textContent=filled.length?fmt(total):"0 ₽";
  totalEl.style.color=total>=4000?"#c9a84c":"#e05252";
  var hint=document.getElementById("deliveryHint");
  if(total>=4000){
    hint.textContent="✓ Бесплатная доставка";
    hint.style.color="#c9a84c";
  } else {
    var diff=4000-total;
    hint.textContent=filled.length?"Ещё "+fmt(diff)+" до бесплатной доставки":"Минимум 4 000 ₽ для бесплатной доставки";
    hint.style.color="#e05252";
  }
  document.getElementById("btnOrder").disabled=filled.length===0;
}

function clearAll(){
  rows=[];
  uid=0;
  for(var i=0;i<3;i++) rows.push({id:"r"+(++uid),product:"",qty:1});
  renderAll();
}

function formOrder(){
  var filled=rows.filter(function(r){return r.product&&PRICE_MAP[r.product];});
  if(!filled.length) return;
  var now=new Date();
  var d=now.toLocaleDateString("ru-RU",{day:"2-digit",month:"2-digit",year:"numeric"});
  var t=now.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  var shipRaw=document.getElementById("shipDate").value;
  var discVal=parseInt(document.getElementById("discount").value)||0;
  var shipStr="";
  if(shipRaw){
    var sp=shipRaw.split("-");
    shipStr=sp[2]+"."+sp[1];
  }
  var bizName=(document.getElementById("bizName").value||"").trim();
  var shipTime=(document.getElementById("shipTime").value||"").trim();
  var DAYS=["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];
  var dayStr="";
  if(shipRaw){var sd=new Date(shipRaw+"T12:00:00");dayStr=DAYS[sd.getDay()];}
  var line1="ЗАЯВКА от "+d.slice(0,5);
  if(bizName) line1+=" на «"+bizName+"»";
  var lines=[line1];
  if(shipStr) lines.push("Отгрузка на "+shipStr+(dayStr?" ("+dayStr+")":""));
  if(shipTime) lines.push("Время отгрузки до "+shipTime);
  lines.push("");
  var catOrder=["Основа","Пюре","Кордиал"];
  catOrder.forEach(function(cat){
    var items=filled.filter(function(r){return PRICE_MAP[r.product].cat===cat;});
    if(!items.length) return;
    lines.push(cat+":");
    items.forEach(function(r){
      var name=r.product.replace(/^.*?— /,"");
      lines.push(name+" — "+r.qty+" шт");
    });
    lines.push("");
  });
  var orderTotal=filled.reduce(function(s,r){return s+discounted(PRICE_MAP[r.product].price)*r.qty;},0);
  var discVal2=getDiscount();
  var markupVal=getMarkup();
  if(markupVal) lines.push("Наценка: +"+markupVal+"%");
  if(discVal2) lines.push("Скидка: "+discVal2+"%");
  lines.push("Сумма: "+orderTotal.toLocaleString("ru-RU")+" рублей");
  document.getElementById("orderText").value=lines.join("\n");
  document.getElementById("overlay").classList.add("show");
  var btn=document.getElementById("btnCopy");
  btn.textContent="📋 Копировать текст";
  btn.classList.remove("done");
}

function closeModal(){document.getElementById("overlay").classList.remove("show");}

function copyText(){
  var ta=document.getElementById("orderText");
  var btn=document.getElementById("btnCopy");
  function done(){btn.textContent="✓ Скопировано!";btn.classList.add("done");setTimeout(function(){btn.textContent="📋 Копировать текст";btn.classList.remove("done");},3000);}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(ta.value).then(done).catch(function(){fb(ta,done);});
  } else {fb(ta,done);}
}
function fb(ta,done){
  ta.select();ta.setSelectionRange(0,99999);
  try{document.execCommand("copy");done();}catch(e){}
}

// Wire up buttons after DOM ready
document.getElementById("btnAdd").addEventListener("click",addRow);
document.getElementById("discount").addEventListener("input",function(){rows.forEach(function(r){updateRowUI(r);});updateSummary();});
document.getElementById("markup").addEventListener("input",function(){rows.forEach(function(r){updateRowUI(r);});updateSummary();});
document.getElementById("markup").addEventListener("input",function(){rows.forEach(function(r){updateRowUI(r);});updateSummary();});
document.getElementById("btnClear").addEventListener("click",clearAll);
document.getElementById("btnOrder").addEventListener("click",formOrder);
document.getElementById("btnCopy").addEventListener("click",copyText);
document.getElementById("btnCloseModal").addEventListener("click",closeModal);
document.getElementById("btnCloseModal2").addEventListener("click",closeModal);
document.getElementById("overlay").addEventListener("click",function(e){if(e.target===this)closeModal();});

clearAll();
</script>
</body>
</html>
